name: CI/CD Pipeline

on:
  push:
    branches: ["main", "review-3"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/film-react-nest-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/film-react-nest-frontend

jobs:
  build:
    name: 🛠️ Build and push Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    name: 🚀 Deploy to production
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directories via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p /opt/film

      - name: Copy docker-compose.yaml and default.conf via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "infra/docker-compose.yaml,infra/default.conf"
          target: "/opt/film"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/film/
            echo 'PORT=3000' > .env
            echo 'NODE_ENV=production' >> .env
            echo 'LOGGER=dev' >> .env
            echo 'DATABASE_DRIVER=postgres' >> .env
            echo 'DATABASE_HOST=postgres' >> .env
            echo 'DATABASE_PORT=5432' >> .env
            echo 'DATABASE_NAME=${{ secrets.DATABASE_NAME }}' >> .env
            echo 'DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}' >> .env
            echo 'DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}' >> .env
            echo 'VITE_API_URL=${{ secrets.VITE_API_URL }}' >> .env

            docker compose pull
            docker compose up -d --remove-orphans