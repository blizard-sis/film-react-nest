version: "3.9"
volumes:
  pg-data:
  backend-static:
networks:
  app-net:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [app-net]

  backend:
    image: blizardsis/film-react-nest-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on: [postgres]
    networks: [app-net]
    volumes:
      - backend-static:/app/public:ro

  frontend:
    image: blizardsis/film-react-nest-frontend:latest
    restart: unless-stopped
    networks: [app-net]
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
