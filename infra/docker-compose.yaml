version: "3.9"

volumes:
  pg-data:
  backend-static:

networks:
  app-net:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [app-net]

  backend:
    build: ../backend
    env_file: .env
    depends_on: [postgres]
    networks: [app-net]
    volumes:
      - backend-static:/app/public:ro
  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    networks: [app-net]
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro